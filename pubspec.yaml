name: ekromssh
description: EkromSSH VPN - Hysteria + SSH WebSocket Client
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.6
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  clipboard: ^0.1.3
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
